<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Social</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; margin: 0; padding: 15px; overflow-x: hidden; }
        .container { max-width: 500px; margin: 0 auto; }
        h3 { margin-bottom: 20px; }
        .input-box { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        textarea { width: 100%; height: 80px; background: transparent; color: #fff; border: none; font-size: 16px; outline: none; resize: none; padding: 0; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn:active { opacity: 0.8; }
        #feed { margin-top: 20px; padding-bottom: 100px; text-align: left; }
        .post { background: #111; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #0088cc; }
        #player { position: fixed; bottom: 0; left: 0; width: 100%; background: #0a0a0a; padding: 15px; border-top: 1px solid #333; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #play-btn { background: #e53935; color: #fff; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Привіт, Максим! 🇺🇦</h3>
        
        <div class="input-box">
            <textarea id="postInput" placeholder="Напиши щось цікаве..."></textarea>
            <button onclick="publish()" id="pubBtn" class="btn">Опублікувати 🚀</button>
        </div>

        <div id="feed">Завантаження...</div>
    </div>

    <div id="player">
        <span>Radio Rocks UA 🎸</span>
        <button id="play-btn" onclick="togglePlay()">ГРАТИ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const URL = "https://qappwloefuraalqfcekl.supabase.co";
        const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";

        // Музика
        let audio = new Audio("https://online.radioroks.ua/RadioROKS");
        function togglePlay() {
            const btn = document.getElementById('play-btn');
            if (audio.paused) { audio.play(); btn.innerText = "ПАУЗА"; }
            else { audio.pause(); btn.innerText = "ГРАТИ"; }
        }

        // Пости
        async function publish() {
            const input = document.getElementById('postInput');
            const btn = document.getElementById('pubBtn');
            if (!input.value.trim()) return;

            btn.disabled = true;
            btn.innerText = "Надсилаю...";

            try {
                const res = await fetch(`${URL}/rest/v1/posts`, {
                    method: 'POST',
                    headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: "Максим", content: input.value })
                });
                if (res.ok) { input.value = ""; load(); }
                else { alert("Помилка бази. Перевір SQL у Supabase!"); }
            } catch (e) { alert("Помилка мережі"); }
            
            btn.disabled = false;
            btn.innerText = "Опублікувати 🚀";
        }

        async function load() {
            try {
                const res = await fetch(`${URL}/rest/v1/posts?select=*&order=created_at.desc`, {
                    headers: { 'apikey': KEY, 'Authorization': `Bearer ${KEY}` }
                });
                const data = await res.json();
                document.getElementById('feed').innerHTML = data.map(p => `
                    <div class="post"><b>@${p.username}</b><p style="margin:5px 0 0;">${p.content}</p></div>
                `).join('');
            } catch (e) { document.getElementById('feed').innerText = "Помилка оновлення"; }
        }
        load();
    </script>
</body>
</html>
