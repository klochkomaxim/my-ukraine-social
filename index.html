<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Warehouse Ultra Scan</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #0057b7; --yellow: #ffd700; }
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .scanner-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #reader { width: 100% !important; max-width: 380px; border-radius: 25px; overflow: hidden; border: 4px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.1); background: #000; }
        .btn-focus { width: 100%; max-width: 380px; background: white; border: 2px solid var(--blue); color: var(--blue); padding: 15px; border-radius: 15px; font-weight: bold; margin-top: 15px; }
        
        #status-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 4px solid var(--yellow); padding: 25px; border-radius: 30px; 
            text-align: center; z-index: 9999; width: 85%; display: none; box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }
        .active { display: block !important; }
    </style>
</head>
<body>

    <div id="status-overlay">
        <h1 id="ov-icon">⏳</h1>
        <h3 id="ov-title" style="color: var(--blue); margin: 10px 0;">Шукаю всюди...</h3>
        <p id="ov-desc" style="font-weight: bold; font-size: 14px; color: #333;"></p>
        <div id="manual-link" style="margin-top:10px; font-size: 12px; color: var(--blue); display:none;"></div>
    </div>

    <div class="header">
        <h2 style="margin:0;">СКЛАД 🇺🇦 УЛЬТРА</h2>
        <div id="whLabel" style="font-size: 13px; opacity: 0.9;">Налаштування...</div>
    </div>

    <div class="scanner-container">
        <div id="reader"></div>
        <button class="btn-focus" onclick="boostCamera()">🔦 ЛІХТАРИК + ФОКУС</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";


    let warehouse = prompt("Назва складу:", "Головний") || "Склад";
    document.getElementById('whLabel').innerText = "Склад: " + warehouse;

    const html5QrCode = new Html5Qrcode("reader");
    let isProcessing = false;
    let videoTrack = null;

    html5QrCode.start({ facingMode: "environment" }, { fps: 24, qrbox: { width: 280, height: 160 } }, onScanSuccess)
        .then(() => { videoTrack = html5QrCode.getRunningTrack(); });

    async function onScanSuccess(code) {
        if (isProcessing) return;
        isProcessing = true;
        html5QrCode.pause();

        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        showOverlay("🔎", "ПОШУК В УСІХ БАЗАХ", code);

        // МУЛЬТИ-ПОШУК
        let name = await multiSearch(code);

        if (!name) {
            name = prompt(`Не знайдено в мережі. Введіть назву товару для коду ${code}:`);
            if (name) {
                await saveToCatalog(code, name);
            } else {
                name = "Невідомий товар";
            }
        }

        showOverlay("✅", "ПРОСКАНОВАНО", name);
        
        await logScan(code, name);
        sendToBot(code, name);

        setTimeout(() => {
            hideOverlay();
            html5QrCode.resume();
            isProcessing = false;
        }, 2500);
    }

    async function multiSearch(code) {
        try {
            // 1. Перевірка своєї бази (Supabase) - найшвидше
            const res = await fetch(`${SB_URL}/product_catalog?barcode=eq.${code}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const data = await res.json();
            if (data && data.length > 0) return data[0].name;

            // 2. Паралельний запит до глобальних баз (хто швидше)
            const results = await Promise.allSettled([
                fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`).then(r => r.json()),
                fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${code}`).then(r => r.json())
            ]);

            for (let res of results) {
                if (res.status === 'fulfilled') {
                    let d = res.value;
                    // Перевірка Open Food Facts
                    if (d.status === 1) return await translate(d.product.product_name || d.product.generic_name);
                    // Перевірка UPC Database
                    if (d.items && d.items.length > 0) return await translate(d.items[0].title);
                }
            }
        } catch (e) { console.error("Search error", e); }
        return null;
    }

    async function translate(text) {
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=uk&dt=t&q=${encodeURIComponent(text)}`);
            const d = await res.json();
            return d[0][0][0];
        } catch { return text; }
    }

    async function saveToCatalog(code, name) {
        return fetch(`${SB_URL}/product_catalog`, {
            method: 'POST',
            headers: { 
                'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 
                'Content-Type': 'application/json',
                'Prefer': 'resolution=merge-duplicates' 
            },
            body: JSON.stringify({ barcode: code, name: name })
        });
    }

    async function logScan(code, name) {
        return fetch(`${SB_URL}/scans`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ warehouse_name: warehouse, code_data: code, product_name: name, username: tg.initDataUnsafe?.user?.first_name || "Склад-Юзер" })
        });
    }

    function boostCamera() {
        if (!videoTrack) return;
        const s = videoTrack.getSettings();
        videoTrack.applyConstraints({
            advanced: [{ zoom: 1.2 }, { torch: !s.torch }, { focusMode: "continuous" }]
        }).catch(() => {});
    }

    function showOverlay(icon, title, desc) {
        document.getElementById('ov-icon').innerText = icon;
        document.getElementById('ov-title').innerText = title;
        document.getElementById('ov-desc').innerText = desc;
        document.getElementById('status-overlay').classList.add('active');
    }

    function hideOverlay() { document.getElementById('status-overlay').classList.remove('active'); }

    function sendToBot(c, n) {
        const msg = `📦 *${warehouse}*\n🔹 *${n}*\n🔢 \`${c}\``;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: msg, parse_mode: 'Markdown' })
        });
    }
</script>
</body>
</html>
