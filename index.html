<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Склад Сканер Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --ua-blue: #0057b7; --ua-yellow: #ffd700; --bg: #f1f5f9; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .header { width: 100%; text-align: center; padding: 20px 0; background: var(--ua-blue); color: white; border-radius: 0 0 20px 20px; margin: -15px -15px 20px -15px; }
        .card { background: white; width: 100%; max-width: 400px; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        #reader { width: 100% !important; border-radius: 20px; overflow: hidden; border: 3px solid #e2e8f0; }
        .btn-flash { width: 100%; background: #e2e8f0; border: none; padding: 15px; border-radius: 15px; font-weight: bold; margin-top: 15px; color: #475569; }
        
        /* ЦЕНТРАЛЬНЕ ВІКНО SUCCESS */
        #successOverlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 4px solid var(--ua-yellow); padding: 40px;
            border-radius: 35px; text-align: center; z-index: 9999; width: 70%;
            display: none; box-shadow: 0 0 50px rgba(0,0,0,0.2);
        }
        .show { display: block !important; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0.5); } 100% { transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

    <div id="successOverlay">
        <h1 style="font-size: 50px; margin: 0;">✅</h1>
        <h2 style="color: var(--ua-blue); margin: 10px 0;">УСПІХ!</h2>
        <p id="itemName" style="font-weight: bold;"></p>
    </div>

    <div class="header">
        <h2 style="margin:0;">UA СКЛАД 🇺🇦</h2>
        <small id="whDisplay">Склад: завантаження...</small>
    </div>

    <div class="card">
        <div id="reader"></div>
        <button class="btn-flash" onclick="toggleFlash()">🔦 ЛІХТАРИК / ФОКУС</button>
        <div id="status" style="margin-top:15px; text-align:center; color: #64748b; font-size: 13px;">Наведіть камеру на код</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";


    let warehouse = prompt("Введіть назву складу:", "Склад №1") || "Склад №1";
    document.getElementById('whDisplay').innerText = "Склад: " + warehouse;

    let lastCode = "";
    let isProcessing = false;
    let videoTrack = null;

    // ФУНКЦІЯ ПЕРЕКЛАДУ
    async function translate(text) {
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=uk&dt=t&q=${encodeURIComponent(text)}`);
            const data = await res.json();
            return data[0][0][0];
        } catch { return text; }
    }

    // ПОШУК ТОВАРУ (ГЛОБАЛЬНИЙ)
    async function findProduct(code) {
        try {
            // 1. Своя база
            const local = await fetch(`${SB_URL}/product_catalog?barcode=eq.${code}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const lData = await local.json();
            if (lData.length > 0) return lData[0].name;

            // 2. Open Food Facts
            const off = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const oData = await off.json();
            if (oData.status === 1) {
                return await translate(oData.product.product_name || oData.product.generic_name);
            }
        } catch (e) {}
        return null;
    }

    // НАЛАШТУВАННЯ СКАНЕРА (ОПТИМІЗОВАНО ПІД IPHONE)
    const html5QrCode = new Html5Qrcode("reader");
    const qrConfig = { 
        fps: 20, 
        qrbox: { width: 250, height: 150 },
        aspectRatio: 1.0,
        videoConstraints: {
            facingMode: "environment",
            width: { ideal: 1280 }, // iPhone краще працює з 720p ніж з 1080p у браузері
            height: { ideal: 720 },
            focusMode: "continuous"
        }
    };

    html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess)
        .then(() => { 
            videoTrack = html5QrCode.getRunningTrack(); 
            // Спроба покращити фокус для iOS через секунду
            setTimeout(() => {
                if(videoTrack) videoTrack.applyConstraints({advanced: [{focusMode: "continuous"}]}).catch(()=>{});
            }, 1000);
        });

    async function onScanSuccess(decodedText) {
        if (isProcessing) return; // Захист від зависання та повторів
        isProcessing = true;

        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

        document.getElementById('status').innerText = "🔎 Шукаю в Google та базах...";
        let name = await findProduct(decodedText);

        if (!name) {
            name = prompt(`Товар не знайдено (${decodedText}). Введіть назву:`);
            if (!name) name = "Невідомий товар";
        }

        // Записуємо в каталог
        saveToCatalog(decodedText, name);

        // Показуємо результат
        document.getElementById('itemName').innerText = name;
        const overlay = document.getElementById('successOverlay');
        overlay.classList.add('show');

        // Відправляємо дані
        saveScan(name, decodedText);
        sendToBot(name, decodedText);

        // Через 3 секунди дозволяємо сканувати знову
        setTimeout(() => {
            overlay.classList.remove('show');
            isProcessing = false;
            document.getElementById('status').innerText = "Готовий до сканування";
        }, 3000);
    }

    function toggleFlash() {
        if (!videoTrack) return;
        const cap = videoTrack.getCapabilities();
        if (cap.torch) {
            videoTrack.applyConstraints({advanced: [{torch: !videoTrack.getSettings().torch}]});
        }
        // iPhone часто потребує "ручного" поштовху для фокусу
        videoTrack.applyConstraints({advanced: [{focusMode: "continuous"}]}).catch(()=>{});
    }

    // ФУНКЦІЇ БАЗИ
    function saveToCatalog(code, name) {
        fetch(`${SB_URL}/product_catalog`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
            body: JSON.stringify({ barcode: code, name: name })
        });
    }

    function saveScan(name, code) {
        fetch(`${SB_URL}/scans`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ warehouse_name: warehouse, code_data: code, product_name: name, username: tg.initDataUnsafe?.user?.first_name })
        });
    }

    function sendToBot(name, code) {
        const msg = `📦 *${warehouse}*\n✅ Товар: *${name}*\n🔢 Код: \`${code}\``;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: msg, parse_mode: 'Markdown' })
        });
    }
</script>
</body>
</html>
