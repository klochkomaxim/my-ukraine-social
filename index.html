<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Склад Сканер FIX</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #0057b7; --yellow: #ffd700; }
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .scanner-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #reader { width: 100% !important; max-width: 380px; border-radius: 25px; overflow: hidden; border: 4px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.15); background: #000; }
        .btn-flash { width: 100%; max-width: 380px; background: white; border: 2px solid var(--blue); color: var(--blue); padding: 15px; border-radius: 15px; font-weight: bold; margin-top: 20px; font-size: 16px; }
        
        #status-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 4px solid var(--yellow); padding: 25px; border-radius: 30px; 
            text-align: center; z-index: 9999; width: 80%; display: none; box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }
        .active { display: block !important; }
    </style>
</head>
<body>

    <div id="status-overlay">
        <h1 id="overlay-icon">🔎</h1>
        <h3 id="overlay-title" style="color: var(--blue);">Шукаю...</h3>
        <p id="overlay-desc" style="font-weight: bold;"></p>
    </div>

    <div class="header">
        <h2 style="margin:0;">UA СКЛАД 🇺🇦</h2>
        <div id="whName" style="font-size: 14px; opacity: 0.8;">Завантаження...</div>
    </div>

    <div class="scanner-wrapper">
        <div id="reader"></div>
        <button class="btn-flash" onclick="boostFocus()">🔦 ЛІХТАРИК / ФОКУС</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";


    let warehouse = prompt("Назва складу:", "Головний") || "Склад";
    document.getElementById('whName').innerText = "Склад: " + warehouse;

    const html5QrCode = new Html5Qrcode("reader");
    let videoTrack = null;
    let isProcessing = false;

    const config = { 
        fps: 25, 
        qrbox: { width: 280, height: 160 },
        videoConstraints: { 
            facingMode: "environment", 
            width: { ideal: 1280 }, 
            height: { ideal: 720 },
            focusMode: "continuous"
        }
    };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => { videoTrack = html5QrCode.getRunningTrack(); setTimeout(boostFocus, 1000); })
        .catch(err => alert("Камера недоступна"));

    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;
        html5QrCode.pause(); 

        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        showOverlay("⏳", "ПОШУК ТОВАРУ", decodedText);

        // Розумний пошук з лімітом часу 3 секунди
        let name = await Promise.race([
            fullSearch(decodedText),
            new Promise(res => setTimeout(() => res(null), 3000))
        ]);

        if (!name) {
            name = prompt(`Товар ${decodedText} не знайдено в мережі.\nВведіть назву вручну:`);
            if (!name) name = "Невідомий товар (" + decodedText + ")";
            else saveToCatalog(decodedText, name); // Зберігаємо, щоб наступного разу знало
        }

        showOverlay("✅", "ГОТОВО", name);
        
        saveScan(decodedText, name);
        sendToTelegram(decodedText, name);

        setTimeout(() => {
            hideOverlay();
            html5QrCode.resume();
            isProcessing = false;
        }, 2000);
    }

    async function fullSearch(code) {
        try {
            // 1. Своя база (Supabase)
            const localRes = await fetch(`${SB_URL}/product_catalog?barcode=eq.${code}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const lData = await localRes.json();
            if (lData && lData.length > 0) return lData[0].name;

            // 2. Open Food Facts API
            const offRes = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const oData = await offRes.json();
            if (oData.status === 1) {
                let n = oData.product.product_name || oData.product.generic_name;
                return await translateUA(n);
            }
        } catch (e) { return null; }
        return null;
    }

    async function translateUA(text) {
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=uk&dt=t&q=${encodeURIComponent(text)}`);
            const d = await res.json();
            return d[0][0][0];
        } catch { return text; }
    }

    function boostFocus() {
        if (!videoTrack) return;
        const capabilities = videoTrack.getCapabilities();
        const settings = videoTrack.getSettings();
        
        videoTrack.applyConstraints({
            advanced: [
                { zoom: capabilities.zoom ? 1.2 : 1.0 },
                { torch: !settings.torch },
                { focusMode: "continuous" }
            ]
        }).catch(() => {});
    }

    function showOverlay(icon, title, desc) {
        document.getElementById('overlay-icon').innerText = icon;
        document.getElementById('overlay-title').innerText = title;
        document.getElementById('overlay-desc').innerText = desc;
        document.getElementById('status-overlay').classList.add('active');
    }

    function hideOverlay() { document.getElementById('status-overlay').classList.remove('active'); }

    function saveScan(code, name) {
        fetch(`${SB_URL}/scans`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ warehouse_name: warehouse, code_data: code, product_name: name, username: tg.initDataUnsafe?.user?.first_name })
        });
    }

    function saveToCatalog(code, name) {
        fetch(`${SB_URL}/product_catalog`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ barcode: code, name: name })
        });
    }

    function sendToTelegram(code, name) {
        const text = `📦 *${warehouse}*\n🔹 Товар: *${name}*\n🔢 Код: \`${code}\``;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: text, parse_mode: 'Markdown' })
        });
    }
</script>
</body>
</html>
