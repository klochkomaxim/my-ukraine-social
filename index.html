<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UkrScanProMax</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #22c55e; --bg: #000; --card: #111; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: white; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; border: 2px solid #22c55e; background: #000; }
        .btn-flash { width: 100%; background: #f59e0b; color: black; border: none; padding: 15px; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .status { margin-top: 15px; padding: 10px; border-radius: 10px; text-align: center; font-weight: bold; background: #1a1a1a; border: 1px solid #333; }
    </style>
</head>
<body>

    <div class="card">
        <input type="text" id="whName" placeholder="Назва складу..." value="Головний Склад">
        <div id="reader"></div>
        <button class="btn-flash" onclick="toggleFlash()">🔦 УВІМКНУТИ ЛІХТАРИК</button>
        <div id="status" class="status">Шукаю коди (QR, Barcode, EAN)...</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";

    let lastResult = "";
    let lastTime = 0;
    let videoTrack = null;
    let isFlash = false;

    // Включаємо підтримку ВСІХ форматів
    const formatsToSupport = [
        Html5QrcodeSupportedFormats.QR_CODE,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.UPC_A,
        Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.DATA_MATRIX,
        Html5QrcodeSupportedFormats.ITF
    ];

    const html5QrCode = new Html5Qrcode("reader", { formatsToSupport: formatsToSupport });

    const config = { 
        fps: 30, // Збільшуємо частоту кадрів для плавності
        qrbox: (viewfinderWidth, viewfinderHeight) => {
            return { width: viewfinderWidth * 0.8, height: viewfinderHeight * 0.4 }; // Широка зона для штрих-кодів
        },
        videoConstraints: {
            facingMode: { exact: "environment" },
            width: { ideal: 1920 }, // Full HD для чіткості дрібних ліній
            height: { ideal: 1080 },
            focusMode: "continuous"
        }
    };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => {
            videoTrack = html5QrCode.getRunningTrack();
            // ПРИМУСОВИЙ АВТОФОКУС через 2 секунди
            setTimeout(() => {
                if (videoTrack) {
                    const capabilities = videoTrack.getCapabilities();
                    if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
                        videoTrack.applyConstraints({ advanced: [{ focusMode: 'continuous' }] });
                    }
                }
            }, 2000);
        });

    async function toggleFlash() {
        if (!videoTrack) return;
        isFlash = !isFlash;
        try {
            await videoTrack.applyConstraints({ advanced: [{ torch: isFlash }] });
        } catch (e) { alert("Ліхтарик не підтримується"); }
    }

    async function onScanSuccess(decodedText) {
        const now = Date.now();
        if (decodedText === lastResult && (now - lastTime) < 2500) return;

        lastResult = decodedText;
        lastTime = now;

        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        document.getElementById('status').innerText = "✅ Зчитано: " + decodedText;
        document.getElementById('status').style.borderColor = "#22c55e";

        const wh = document.getElementById('whName').value || "Склад";
        
        // Відправка
        fetch(SB_URL, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ warehouse_name: wh, code_data: decodedText, username: tg.initDataUnsafe?.user?.first_name || "User" })
        });

        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: `📦 *${wh}:* \`${decodedText}\``, parse_mode: 'Markdown' })
        });

        setTimeout(() => {
            document.getElementById('status').innerText = "Готовий до наступного коду...";
            document.getElementById('status').style.borderColor = "#333";
        }, 2000);
    }
</script>
</body>
</html>
