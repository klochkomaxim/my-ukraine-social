<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Склад Pro v3</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #0057b7; --yellow: #ffd700; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; }
        .scanner-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #reader { width: 100% !important; max-width: 400px; border-radius: 20px; overflow: hidden; border: 4px solid white; background: #000; }
        .btn { width: 100%; max-width: 400px; background: white; border: 2px solid var(--blue); color: var(--blue); padding: 15px; border-radius: 15px; font-weight: bold; margin-top: 15px; }
        
        #overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 4px solid var(--yellow); padding: 25px; border-radius: 30px; 
            text-align: center; z-index: 9999; width: 85%; display: none; box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }
        .active { display: block !important; }
        #debug-log { font-size: 10px; color: red; padding: 10px; word-break: break-all; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 id="ov-icon">⏳</h1>
    <h3 id="ov-title">Шукаю...</h3>
    <p id="ov-desc"></p>
</div>

<div class="header">
    <h2 style="margin:0;">UA СКЛАД 🇺🇦</h2>
    <div id="whLabel" style="font-size: 13px;">Завантаження...</div>
</div>

<div class="scanner-container">
    <div id="reader"></div>
    <button class="btn" onclick="boostCamera()">🔦 ЛІХТАРИК / ФОКУС</button>
    <div id="debug-log"></div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";


    let warehouse = prompt("Назва складу:", "Головний") || "Склад";
    document.getElementById('whLabel').innerText = "Склад: " + warehouse;

    const html5QrCode = new Html5Qrcode("reader");
    let isBusy = false;
    let videoTrack = null;

    function logError(msg) {
        document.getElementById('debug-log').innerText += "\n" + msg;
    }

    html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess)
        .then(() => { videoTrack = html5QrCode.getRunningTrack(); })
        .catch(e => logError("Помилка камери: " + e));

    async function onScanSuccess(code) {
        if (isBusy) return;
        isBusy = true;
        html5QrCode.pause();
        
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        showOverlay("🔎", "АНАЛІЗ...", code);

        // 1. ПЕРЕВІРКА БАЗ (Supabase -> Глобальні)
        let name = await fullSearch(code);

        // 2. ЯКЩО НЕМАЄ - ВВОДИМО ВРУЧНУ
        if (!name) {
            name = prompt(`Товар не знайдено. Вкажіть назву для ${code}:`);
            if (name) {
                const saved = await saveToCatalog(code, name);
                if (!saved) alert("Помилка збереження в базу!");
            } else {
                name = "Невідомий товар";
            }
        }

        showOverlay("✅", "ГОТОВО", name);

        // 3. ФІКСАЦІЯ ТА ВІДПРАВКА
        await logScan(code, name);
        sendBot(code, name);

        setTimeout(() => {
            hideOverlay();
            html5QrCode.resume();
            isBusy = false;
        }, 2500);
    }

    async function fullSearch(code) {
        try {
            // Крок А: Supabase
            const res = await fetch(`${SB_URL}/product_catalog?barcode=eq.${code}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const data = await res.json();
            if (data && data.length > 0) return data[0].name;

            // Крок Б: Open Food Facts
            const off = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const oData = await off.json();
            if (oData && oData.status === 1) {
                return await translateUA(oData.product.product_name || oData.product.generic_name);
            }
        } catch (e) { logError("Помилка пошуку: " + e.message); }
        return null;
    }

    async function saveToCatalog(code, name) {
        try {
            const res = await fetch(`${SB_URL}/product_catalog`, {
                method: 'POST',
                headers: { 
                    'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 
                    'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' 
                },
                body: JSON.stringify({ barcode: code, name: name })
            });
            return res.ok;
        } catch (e) { 
            logError("Збереження не вдалося: " + e.message);
            return false;
        }
    }

    async function logScan(code, name) {
        fetch(`${SB_URL}/scans`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                warehouse_name: warehouse, 
                code_data: code, 
                product_name: name, 
                username: tg.initDataUnsafe?.user?.first_name || "Користувач" 
            })
        });
    }

    async function translateUA(text) {
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=uk&dt=t&q=${encodeURIComponent(text)}`);
            const d = await res.json();
            return d[0][0][0];
        } catch { return text; }
    }

    function boostCamera() {
        if (!videoTrack) return;
        const s = videoTrack.getSettings();
        videoTrack.applyConstraints({
            advanced: [{ torch: !s.torch }, { focusMode: "continuous" }]
        }).catch(() => {});
    }

    function showOverlay(i, t, d) {
        document.getElementById('ov-icon').innerText = i;
        document.getElementById('ov-title').innerText = t;
        document.getElementById('ov-desc').innerText = d;
        document.getElementById('overlay').classList.add('active');
    }
    function hideOverlay() { document.getElementById('overlay').classList.remove('active'); }

    function sendBot(c, n) {
        const txt = `📦 *${warehouse}*\n🔹 *${n}*\n🔢 \`${c}\``;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: txt, parse_mode: 'Markdown' })
        });
    }
</script>
</body>
</html>
