<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA СКЛАД FINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; margin: 0; text-align: center; }
        #reader { width: 100% !important; height: 50vh !important; background: #111; }
        #log-area { background: #111; color: #0f0; font-size: 10px; height: 30vh; overflow-y: auto; padding: 10px; font-family: monospace; border-top: 2px solid #0057b7; text-align: left; }
        .btn { background: #0057b7; color: white; border: none; padding: 15px; width: 90%; border-radius: 10px; margin-top: 10px; font-weight: bold; }
        #ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div id="ov">
    <h1 id="ov-i">🔎</h1>
    <h2 id="ov-t">ОБРОБКА...</h2>
    <p id="ov-d" style="color: #ffd700;"></p>
</div>

<div style="background: #0057b7; padding: 10px;">UA СКЛАД v9.0</div>
<div id="reader"></div>
<button class="btn" onclick="location.reload()">🔄 ПЕРЕЗАПУСТИТИ КАМЕРУ</button>
<div id="log-area"><div>> Система готова...</div></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";

    function writeLog(m, c = "#0f0") {
        const l = document.getElementById('log-area');
        l.innerHTML = `<div style="color:${c}">> ${m}</div>` + l.innerHTML;
    }

    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);

    async function onScanSuccess(code) {
        scanner.pause();
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        
        showOv("🔎", "ПОШУК", code);
        writeLog("Код: " + code, "#fff");

        let name = null;

        // КРОК 1: Спроба дуже швидкого пошуку в базі
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000); // Тайм-аут 2 секунди
            const res = await fetch(`${SB_URL}/product_catalog?barcode=eq.${code}`, {
                headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY },
                signal: controller.signal
            });
            const data = await res.json();
            if (data && data.length > 0) name = data[0].name;
        } catch(e) { 
            writeLog("База не відповіла вчасно", "orange");
        }

        // КРОК 2: Якщо не знайшли — просимо назву ВІДРАЗУ
        if (!name) {
            name = prompt("Назва товару для " + code + ":");
        }

        if (name) {
            showOv("✅", "ВІДПРАВКА", name);
            writeLog("Обробка: " + name);

            // КРОК 3: ПАРАЛЕЛЬНА ВІДПРАВКА (не чекаємо один одного)
            sendToTelegram(code, name);
            saveToSupabase(code, name);
        }

        setTimeout(() => {
            hideOv();
            scanner.resume();
        }, 2000);
    }

    // ФУНКЦІЇ ВІДПРАВКИ (БЕЗ ОЧІКУВАННЯ)
    function sendToTelegram(c, n) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: `📦 ${n}\n🔢 ${c}` })
        }).then(() => writeLog("Telegram: OK", "#00ccff"))
          .catch(() => writeLog("Telegram: Помилка", "red"));
    }

    function saveToSupabase(c, n) {
        fetch(`${SB_URL}/product_catalog`, {
            method: "POST",
            headers: { 
                "apikey": SB_KEY, 
                "Authorization": "Bearer " + SB_KEY, 
                "Content-Type": "application/json",
                "Prefer": "resolution=merge-duplicates"
            },
            body: JSON.stringify({ barcode: c, name: n })
        }).then(() => writeLog("База: Оновлено", "yellow"))
          .catch(() => writeLog("База: Помилка збереження", "red"));
          
        // Також пишемо в історію сканування
        fetch(`${SB_URL}/scans`, {
            method: "POST",
            headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" },
            body: JSON.stringify({ warehouse_name: "Головний", code_data: c, product_name: n, username: "Admin" })
        });
    }

    function showOv(i, t, d) {
        document.getElementById('ov-i').innerText = i;
        document.getElementById('ov-t').innerText = t;
        document.getElementById('ov-d').innerText = d;
        document.getElementById('ov').style.display = 'flex';
    }
    function hideOv() { document.getElementById('ov').style.display = 'none'; }
</script>
</body>
</html>
