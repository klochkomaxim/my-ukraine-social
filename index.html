<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 15px; }
        .card { background: #111; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; }
        .btn { background: #22c55e; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <input type="text" id="whName" placeholder="Назва складу" style="width:100%; padding:10px; background:#222; color:white; border:none; border-radius:8px;">
        <div id="reader"></div>
        <div id="result" style="margin-top:10px; color:#22c55e;">Готовий до сканування...</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const URL = "https://qappwloefuraalqfcekl.supabase.co/rest/v1/scans";
    const KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDAxMjEzOTYsImV4cCI6MjA1NTcwMTM5Nn0.2E7Lp8m6t0s3p6Z2X7Lp8m6t0s3p6Z2X7Lp8m6t0s3p";

    let lastResult = "";
    let lastScanTime = 0;

    const html5QrCode = new Html5Qrcode("reader");

    // Запуск сканера з фокусом на задню камеру
    html5QrCode.start(
        { facingMode: "environment" }, 
        { fps: 10, qrbox: { width: 250, height: 150 } },
        async (decodedText) => {
            const now = Date.now();
            // Захист від спаму: той самий код можна сканувати лише раз на 3 секунди
            if (decodedText === lastResult && (now - lastScanTime) < 3000) return;

            lastResult = decodedText;
            lastScanTime = now;

            document.getElementById('result').innerText = "Відправляю: " + decodedText;
            await sendToSupabase(decodedText);
        }
    );

    async function sendToSupabase(code) {
        try {
            const response = await fetch(URL, {
                method: 'POST',
                headers: { 
                    'apikey': KEY, 
                    'Authorization': `Bearer ${KEY}`, 
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({
                    warehouse_name: document.getElementById('whName').value || "Без назви",
                    code_data: code,
                    username: tg.initDataUnsafe?.user?.first_name || "Максим"
                })
            });

            if (response.ok) {
                document.getElementById('result').innerText = "✅ Успішно: " + code;
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                document.getElementById('result').innerText = "❌ Помилка бази (див. CORS)";
            }
        } catch (e) {
            document.getElementById('result').innerText = "❌ Мережа: " + e.message;
        }
    }
</script>
</body>
</html>
