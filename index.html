<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Social</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 20px; text-align: center; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        textarea { width: 100%; box-sizing: border-box; background: #2a2a2a; color: white; border: none; padding: 10px; border-radius: 10px; }
        button { background: #0088cc; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; margin-top: 10px; font-weight: bold; cursor: pointer; }
        .post { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-top: 10px; text-align: left; border-left: 4px solid #0088cc; }
        #player-ui { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1a1a; padding: 15px; border-top: 2px solid #0088cc; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2>Привіт, <span id="user-name">Максим</span>! 🇺🇦</h2>

    <div class="card">
        <textarea id="post-text" placeholder="Напиши щось..."></textarea>
        <button onclick="publishPost()" id="pub-btn">Опублікувати 🚀</button>
    </div>

    <div id="feed">Завантаження постів...</div>

    <div id="player-ui">
        <span style="font-size: 14px;">🎵 UA Radio</span>
        <button onclick="playMusic()" id="play-btn" style="width: auto; margin: 0;">Увімкнути музику ▶</button>
    </div>

    <iframe id="sc-player" style="display:none" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" 
        src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/1261543453&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true">
    </iframe>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "Максим";

    // ДАНІ SUPABASE (ПЕРЕВІР ЇХ!)
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDAxMjEzOTYsImV4cCI6MjA1NTcwMTM5Nn0.2E7Lp8m6t0s3p6Z2X7Lp8m6t0s3p6Z2X7Lp8m6t0s3p"; 

    // Функція музики
    const widget = SC.Widget(document.getElementById('sc-player'));
    function playMusic() {
        widget.play();
        document.getElementById('play-btn').innerText = "Грає 🎵";
    }

    // Публікація
    async function publishPost() {
        const text = document.getElementById('post-text').value;
        const btn = document.getElementById('pub-btn');
        if(!text) return alert("Порожньо!");
        
        btn.innerText = "Надсилаю...";
        try {
            const res = await fetch(`${SB_URL}/rest/v1/posts`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: tg.initDataUnsafe.user?.first_name || "Гість",
                    content: text
                })
            });
            if(res.ok) {
                document.getElementById('post-text').value = "";
                loadFeed();
            }
        } catch(e) { alert("Помилка бази!"); }
        btn.innerText = "Опублікувати 🚀";
    }

    // Стрічка
    async function loadFeed() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/posts?select=*&order=created_at.desc`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const posts = await res.json();
            document.getElementById('feed').innerHTML = posts.map(p => `
                <div class="post">
                    <b>@${p.username}</b>
                    <p>${p.content}</p>
                </div>
            `).join('');
        } catch(e) { document.getElementById('feed').innerText = "Помилка завантаження"; }
    }

    loadFeed();
</script>
</body>
</html>
