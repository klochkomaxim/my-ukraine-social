<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Social</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 15px; text-align: center; }
        .card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        textarea { width: 100%; box-sizing: border-box; background: #222; color: white; border: none; padding: 12px; border-radius: 10px; font-size: 16px; min-height: 60px; }
        button { background: #0088cc; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .post { background: #111; padding: 12px; border-radius: 12px; margin-top: 10px; text-align: left; border-left: 4px solid #0088cc; }
        #player-ui { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #0088cc; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
    </style>
</head>
<body>

    <h3 id="welcome">Привіт! 🇺🇦</h3>

    <div class="card">
        <textarea id="post-text" placeholder="Напиши щось..."></textarea>
        <button onclick="publishPost()" id="pub-btn">Опублікувати 🚀</button>
    </div>

    <div id="feed">Завантаження...</div>

    <div id="player-ui">
        <span>🎵 Radio UA</span>
        <button onclick="toggleAudio()" id="play-btn" style="width: auto; margin: 0; padding: 5px 20px;">Грати ▶</button>
    </div>

    <audio id="myAudio" src="https://online.radiobayraktar.com.ua/RadioBayraktar"></audio>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    document.getElementById('welcome').innerText = "Привіт, " + (tg.initDataUnsafe.user?.first_name || "Максим") + "! 🇺🇦";

    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI"; 

    // Керування музикою
    const audio = document.getElementById('myAudio');
    function toggleAudio() {
        const btn = document.getElementById('play-btn');
        if (audio.paused) {
            audio.play().catch(e => alert("Натисніть ще раз для звуку"));
            btn.innerText = "Пауза ⏸";
        } else {
            audio.pause();
            btn.innerText = "Грати ▶";
        }
    }

    // Публікація
    async function publishPost() {
        const text = document.getElementById('post-text').value;
        const btn = document.getElementById('pub-btn');
        if(!text.trim()) return;

        btn.disabled = true;
        btn.innerText = "Надсилаю...";

        try {
            await fetch(`${SB_URL}/rest/v1/posts`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: tg.initDataUnsafe.user?.first_name || "Максим",
                    content: text
                })
            });
            document.getElementById('post-text').value = "";
            loadFeed();
        } catch(e) { alert("Помилка!"); }
        
        btn.disabled = false;
        btn.innerText = "Опублікувати 🚀";
    }

    // Стрічка
    async function loadFeed() {
        try {
            const res = await fetch(`${SB_URL}/rest/v1/posts?select=*&order=created_at.desc`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const posts = await res.json();
            document.getElementById('feed').innerHTML = posts.map(p => `
                <div class="post">
                    <b style="color:#0088cc;">@${p.username}</b>
                    <p style="margin:5px 0 0;">${p.content}</p>
                </div>
            `).join('');
        } catch(e) { document.getElementById('feed').innerText = "Помилка оновлення"; }
    }

    loadFeed();
</script>
</body>
</html>
