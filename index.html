<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Social AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg: #1a1a1a; --tg-theme-button: #0088cc; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 80px; }
        .header { sticky; top: 0; background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        .card { background: #1e1e1e; border-radius: 15px; padding: 15px; margin: 15px; border: 1px solid #333; }
        input, textarea { width: 90%; background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        button { background: var(--tg-theme-button); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .post { background: #1e1e1e; margin: 15px; padding: 15px; border-radius: 12px; border-left: 4px solid #0088cc; }
        .post img, .post video { width: 100%; border-radius: 8px; margin-top: 10px; }
        .post-author { font-weight: bold; color: #0088cc; margin-bottom: 5px; display: block; }
        #player { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; border-top: 2px solid #0088cc; padding: 10px; display: flex; align-items: center; justify-content: space-around; }
        .loading { text-align: center; color: #888; }
    </style>
</head>
<body>

<div class="header">
    <h3>Р’С–С‚Р°СЋ, <span id="user-name">РљРѕР·Р°С‡Рµ</span>! рџ‡єрџ‡¦</h3>
</div>

<div class="card">
    <textarea id="post-text" placeholder="Р©Рѕ РЅРѕРІРѕРіРѕ?"></textarea>
    <button onclick="askAI()" style="background: #6a1b9a; margin-bottom: 10px;">Р”РѕРїРѕРјРѕРіР° AI вњЁ</button>
    <button onclick="document.getElementById('file-input').click()">Р”РѕРґР°С‚Рё РјРµРґС–Р° рџ“Ѓ</button>
    <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(this)">
    <button onclick="publishPost()" style="margin-top: 10px; background: #2e7d32;">РћРїСѓР±Р»С–РєСѓРІР°С‚Рё рџљЂ</button>
</div>

<div id="feed">
    <div class="loading">Р—Р°РІР°РЅС‚Р°Р¶РµРЅРЅСЏ СЃС‚СЂС–С‡РєРё...</div>
</div>

<div id="player">
    <span id="track-name">рџЋµ UA Lounge</span>
    <audio id="audio-element" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    <button onclick="toggleMusic()" style="width: auto;">вЏЇ Р“СЂР°С‚Рё/РџР°СѓР·Р°</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "РљРѕСЂРёСЃС‚СѓРІР°С‡";

    // РљРћРќР¤Р†Р“РЈР РђР¦Р†РЇ (Р’РЎРўРђР’ РЎР’РћР‡ Р”РђРќР† РўРЈРў)
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";
    const GEMINI_KEY = "AIzaSyCnqveCi2gQzVAJCaORQYdA4P68adIArIg";
    const BOT_TOKEN = "7951253178:AAGgUkn-6iXwGUSMe8aF3eWl916RP2dhg";

    let currentFileId = null;

    // 1. Р¤СѓРЅРєС†С–СЏ AI
    async function askAI() {
        const text = document.getElementById('post-text').value;
        if (!text) return alert("РќР°РїРёС€Рё С…РѕС‡ СЃР»РѕРІРѕ!");
        const btn = event.target; btn.innerText = "AI РґСѓРјР°С”...";
        
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_KEY}`, {
            method: 'POST',
            body: JSON.stringify({ contents: [{ parts: [{ text: "Р—СЂРѕР±Рё С†РµР№ С‚РµРєСЃС‚ РґР»СЏ СЃРѕС†РјРµСЂРµР¶С– С†С–РєР°РІС–С€РёРј СѓРєСЂР°С—РЅСЃСЊРєРѕСЋ: " + text }] }] })
        });
        const data = await res.json();
        document.getElementById('post-text').value = data.candidates[0].content.parts[0].text;
        btn.innerText = "Р”РѕРїРѕРјРѕРіР° AI вњЁ";
    }

    // 2. Р—Р°РІР°РЅС‚Р°Р¶РµРЅРЅСЏ С„Р°Р№Р»С–РІ Сѓ Telegram (Р‘РµР·РєРѕС€С‚РѕРІРЅРµ СЃС…РѕРІРёС‰Рµ)
    async function handleFileUpload(input) {
        const file = input.files[0];
        const formData = new FormData();
        formData.append('chat_id', tg.initDataUnsafe.user.id);
        formData.append('document', file);

        alert("Р—Р°РІР°РЅС‚Р°Р¶СѓС”РјРѕ С„Р°Р№Р» Сѓ С…РјР°СЂСѓ...");
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: formData });
        const data = await res.json();
        if(data.ok) {
            currentFileId = data.result.document.file_id;
            alert("Р¤Р°Р№Р» РіРѕС‚РѕРІРёР№ РґРѕ РїСѓР±Р»С–РєР°С†С–С—!");
        }
    }

    // 3. РџСѓР±Р»С–РєР°С†С–СЏ РІ Supabase
    async function publishPost() {
        const content = document.getElementById('post-text').value;
        if(!content && !currentFileId) return;

        await fetch(`${SB_URL}/rest/v1/posts`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: tg.initDataUnsafe.user.id,
                username: tg.initDataUnsafe.user.first_name,
                content: content,
                media_url: currentFileId
            })
        });
        document.getElementById('post-text').value = "";
        currentFileId = null;
        loadFeed();
    }

    // 4. Р—Р°РІР°РЅС‚Р°Р¶РµРЅРЅСЏ СЃС‚СЂС–С‡РєРё
    async function loadFeed() {
        const res = await fetch(`${SB_URL}/rest/v1/posts?select=*&order=created_at.desc`, {
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
        });
        const posts = await res.json();
        const feedDiv = document.getElementById('feed');
        feedDiv.innerHTML = posts.map(p => `
            <div class="post">
                <span class="post-author">@${p.username || 'РђРЅРѕРЅС–Рј'}</span>
                <div>${p.content}</div>
                ${p.media_url ? `<p style="font-size:10px; color:#555;">рџ“Ћ Р¤Р°Р№Р» РїСЂРёРєСЂС–РїР»РµРЅРѕ (ID: ${p.media_url})</p>` : ''}
            </div>
        `).join('');
    }

    // 5. РџР»РµС”СЂ
    function toggleMusic() {
        const audio = document.getElementById('audio-element');
        audio.paused ? audio.play() : audio.pause();
    }

    loadFeed(); // Р—Р°РїСѓСЃРє РїСЂРё СЃС‚Р°СЂС‚С–
</script>

</body>
</html>
