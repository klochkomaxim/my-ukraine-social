<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Social</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 20px; padding-bottom: 100px; }
        .card { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #333; }
        textarea { width: 100%; box-sizing: border-box; background: #222; color: white; border: none; padding: 12px; border-radius: 10px; margin-bottom: 10px; }
        button { background: #0088cc; color: white; border: none; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .post { background: #111; padding: 15px; border-radius: 12px; margin-top: 10px; text-align: left; border-left: 4px solid #0088cc; }
        #player-ui { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; padding: 15px; border-top: 1px solid #0088cc; display: flex; align-items: center; justify-content: space-between; box-sizing: border-box; z-index: 1000; }
        #yt-api-player { display: none; }
    </style>
</head>
<body>

    <h2>Привіт, <span id="user-name">Максим</span>! 🇺🇦</h2>

    <div class="card">
        <textarea id="post-text" placeholder="Напиши щось цікаве..."></textarea>
        <button onclick="publishPost()" id="pub-btn">Опублікувати 🚀</button>
    </div>

    <div id="feed">Завантаження стрічки...</div>

    <div id="yt-api-player"></div>

    <div id="player-ui">
        <span style="font-size: 14px;">🎵 UA Топ 2026</span>
        <button onclick="toggleMusic()" id="play-btn" style="width: auto; margin: 0; padding: 8px 20px;">Грати ▶</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "Максим";

    // ТВОЇ ДАНІ SUPABASE (ЗІ СКРИНШОТІВ)
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI"; 

    // Налаштування YouTube
    let player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-api-player', {
            height: '0', width: '0',
            playerVars: { 'listType': 'playlist', 'list': 'PL7M38X9S0l_Xf1P0rMshP_e_G3L6vG_m9' }, // Український плейлист
        });
    }

    function toggleMusic() {
        const btn = document.getElementById('play-btn');
        if (player.getPlayerState() === 1) {
            player.pauseVideo();
            btn.innerText = "Грати ▶";
        } else {
            player.playVideo();
            btn.innerText = "Пауза ⏸";
        }
    }

    // Завантаження коду YouTube API
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.body.appendChild(tag);

    // Публікація
    async function publishPost() {
        const text = document.getElementById('post-text').value;
        if(!text) return;
        
        const res = await fetch(`${SB_URL}/rest/v1/posts`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: tg.initDataUnsafe.user?.first_name || "Максим",
                content: text
            })
        });
        if(res.ok) {
            document.getElementById('post-text').value = "";
            loadFeed();
        }
    }

    // Стрічка
    async function loadFeed() {
        const res = await fetch(`${SB_URL}/rest/v1/posts?select=*&order=created_at.desc`, {
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
        });
        const posts = await res.json();
        if(posts.length === 0) {
            document.getElementById('feed').innerText = "Поки що тут порожньо. Напиши перший пост!";
        } else {
            document.getElementById('feed').innerHTML = posts.map(p => `
                <div class="post">
                    <b style="color: #0088cc;">@${p.username}</b>
                    <p>${p.content}</p>
                </div>
            `).join('');
        }
    }

    loadFeed();
</script>
</body>
</html>
