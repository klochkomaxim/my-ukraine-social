<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Social AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --tg-theme-bg: #1a1a1a; --tg-theme-button: #0088cc; }
        body { font-family: Arial, sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 80px; text-align: center; }
        .card { background: #1e1e1e; border-radius: 15px; padding: 15px; margin: 15px; border: 1px solid #333; }
        textarea { width: 90%; background: #2a2a2a; border: 1px solid #444; color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; min-height: 80px; }
        button { background: var(--tg-theme-button); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 8px; }
        .post { background: #1e1e1e; margin: 15px; padding: 15px; border-radius: 12px; text-align: left; border-left: 4px solid #0088cc; }
        #player { position: fixed; bottom: 0; width: 100%; background: #1a1a1a; border-top: 2px solid #0088cc; padding: 15px; display: flex; align-items: center; justify-content: space-around; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2 style="margin-top:20px;">Привіт, <span id="user-name">Максим</span>! 🇺🇦</h2>

    <div class="card">
        <textarea id="post-text" placeholder="Що цікавого сьогодні?"></textarea>
        <button onclick="askAI()" style="background: #6a1b9a;">Допомога AI ✨</button>
        <button onclick="document.getElementById('file-input').click()" style="background: #0288d1;">Додати медіа 📁</button>
        <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(this)">
        <button onclick="publishPost()" style="background: #2e7d32;">Опублікувати 🚀</button>
    </div>

    <div id="feed">
        <p style="color: #666;">Завантаження стрічки...</p>
    </div>

    <div id="player">
        <span>🎵 UA Lounge</span>
        <button onclick="toggleMusic()" style="width: auto; padding: 5px 15px;">⏯ Грати/Пауза</button>
        <audio id="audio-element" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "Максим";

    // ТВОЇ ДАНІ ЗІ СКРИНШОТІВ
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co"; 
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI"; // Встав сюди повний Anon Key
    const GEMINI_KEY = "AIzaSyCnqveCi2gQzVAJCaORQYdA4P68adIArIg";
    const BOT_TOKEN = "7951253178:AAGgUkn-6iXwGUSMe8aF3eWl916RP2dhg";

    let currentFileId = null;

    async function askAI() {
        const text = document.getElementById('post-text').value;
        if (!text) return alert("Спочатку напиши щось!");
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_KEY}`, {
            method: 'POST',
            body: JSON.stringify({ contents: [{ parts: [{ text: "Зроби цей текст для української соцмережі кращим: " + text }] }] })
        });
        const data = await res.json();
        document.getElementById('post-text').value = data.candidates[0].content.parts[0].text;
    }

    async function handleFileUpload(input) {
        const file = input.files[0];
        const formData = new FormData();
        formData.append('chat_id', tg.initDataUnsafe.user.id);
        formData.append('document', file);
        alert("Завантаження...");
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: formData });
        const data = await res.json();
        if(data.ok) {
            currentFileId = data.result.document.file_id;
            alert("Файл готовий!");
        }
    }

    async function publishPost() {
        const content = document.getElementById('post-text').value;
        await fetch(`${SB_URL}/rest/v1/posts`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                user_id: tg.initDataUnsafe.user.id,
                username: tg.initDataUnsafe.user.first_name || "Користувач",
                content: content,
                media_url: currentFileId
            })
        });
        document.getElementById('post-text').value = "";
        currentFileId = null;
        loadFeed();
    }

    async function loadFeed() {
        const res = await fetch(`${SB_URL}/rest/v1/posts?select=*&order=created_at.desc`, {
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
        });
        const posts = await res.json();
        document.getElementById('feed').innerHTML = posts.map(p => `
            <div class="post">
                <b style="color:#0088cc;">@${p.username}</b>
                <p>${p.content}</p>
                ${p.media_url ? `<small style="color:#555;">📎 Файл ID: ${p.media_url}</small>` : ''}
            </div>
        `).join('');
    }

    function toggleMusic() {
        const audio = document.getElementById('audio-element');
        audio.paused ? audio.play() : audio.pause();
    }

    loadFeed();
</script>
</body>
</html>
