<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Social AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 20px; text-align: center; }
        .card { background: #2a2a2a; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        button { background: #0088cc; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        input { width: 80%; padding: 10px; border-radius: 10px; border: none; margin-bottom: 10px; }
        #player-container { position: fixed; bottom: 0; left: 0; width: 100%; background: #0088cc; padding: 5px; font-size: 12px; }
    </style>
</head>
<body>

    <h2>Привіт, <span id="user-name">Козаче</span>! 🇺🇦</h2>
    
    <div class="card">
        <h3>Створити пост з AI</h3>
        <input type="text" id="ai-input" placeholder="Про що хочеш написати?">
        <button onclick="askAI()">Згенерувати текст ✨</button>
        <p id="ai-result" style="font-style: italic; color: #aaa;"></p>
    </div>

    <div class="card">
        <h3>Стрічка новин</h3>
        <p>Тут будуть пости з Supabase...</p>
        <button onclick="uploadFile()">Додати фото/відео/музику 📁</button>
    </div>

    <div id="player-container">
        🎵 Зараз грає: Український Chill | <button onclick="toggleMusic()">⏯</button>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Ініціалізація Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); // Розгорнути на весь екран
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "Гість";

        // Функція для AI (твій ключ Gemini)
        async function askAI() {
            const prompt = document.getElementById('ai-input').value;
            const resField = document.getElementById('ai-result');
            resField.innerText = "Думаю...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=AIzaSyCnqveCi2gQzVAJCaORQYdA4P68adIArIg`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Напиши короткий пост для української соцмережі про: " + prompt }] }] })
                });
                const data = await response.json();
                resField.innerText = data.candidates[0].content.parts[0].text;
            } catch (e) {
                resField.innerText = "Помилка AI. Перевір ключ або ліміти.";
            }
        }

        // Керування музикою
        const music = document.getElementById('bg-music');
        function toggleMusic() {
            if (music.paused) music.play();
            else music.pause();
        }
    </script>
</body>
</html>
