<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Warehouse Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #0057b7; --yellow: #ffd700; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f4f7f9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .scanner-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #reader { width: 100% !important; max-width: 400px; border-radius: 25px; overflow: hidden; border: 4px solid white; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn-focus { width: 100%; max-width: 400px; background: white; border: 2px solid var(--blue); color: var(--blue); padding: 16px; border-radius: 16px; font-weight: bold; margin-top: 15px; font-size: 16px; }
        
        /* СТИЛЬ ВІКНА РЕЗУЛЬТАТУ */
        #status-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; border: 4px solid var(--yellow); padding: 30px; border-radius: 30px; 
            text-align: center; z-index: 9999; width: 85%; display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .active { display: block !important; animation: pop 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.2); }
        @keyframes pop { from { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="status-overlay">
        <h1 id="ov-icon" style="font-size: 50px; margin: 0;">🔎</h1>
        <h3 id="ov-title" style="color: var(--blue); margin: 15px 0;">Обробка...</h3>
        <p id="ov-desc" style="font-weight: bold; font-size: 18px; color: #333; margin: 0;"></p>
    </div>

    <div class="header">
        <h2 style="margin:0;">UA СКЛАД 🇺🇦</h2>
        <div id="whLabel" style="font-size: 13px; opacity: 0.9;">Налаштування...</div>
    </div>

    <div class="scanner-container">
        <div id="reader"></div>
        <button class="btn-focus" onclick="boostCamera()">🔦 ЛІХТАРИК + АВТОФОКУС</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";


    let warehouse = prompt("Назва складу:", "Основний") || "Склад";
    document.getElementById('whLabel').innerText = "Склад: " + warehouse;

    const html5QrCode = new Html5Qrcode("reader");
    let isBusy = false;
    let videoTrack = null;

    // СТАРТ СКАНЕРА З ПАРАМЕТРАМИ ДЛЯ IPHONE
    html5QrCode.start({ facingMode: "environment" }, { 
        fps: 20, 
        qrbox: { width: 280, height: 160 },
        videoConstraints: { focusMode: "continuous", width: {ideal: 1280}, height: {ideal: 720} }
    }, onScanSuccess).then(() => { videoTrack = html5QrCode.getRunningTrack(); });

    async function onScanSuccess(code) {
        if (isBusy) return;
        isBusy = true;
        
        try {
            await html5QrCode.pause(true); // Пауза з заморозкою кадру
        } catch(e) { console.log("Pause error"); }

        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        showOverlay("🔎", "ПОШУК В БАЗАХ", code);

        let name = await ultraSearch(code);

        if (!name) {
            name = prompt(`Код ${code} не знайдено.\nВведіть назву товару:`);
            if (name) {
                await saveToCatalog(code, name);
            } else {
                name = "Невідомий товар";
            }
        }

        showOverlay("✅", "УСПІШНО", name);
        
        await logScan(code, name);
        sendToBot(code, name);

        // Даємо 3 секунди подивитись на результат
        setTimeout(async () => {
            hideOverlay();
            try {
                await html5QrCode.resume();
            } catch(e) { console.log("Resume error"); }
            isBusy = false;
        }, 3000);
    }

    async function ultraSearch(code) {
        // 1. Своя база (Supabase) - ЗАВЖДИ ПЕРША
        try {
            const res = await fetch(`${SB_URL}/product_catalog?barcode=eq.${code}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const data = await res.json();
            if (data && data.length > 0) return data[0].name;
        } catch(e) { console.error("Supabase error", e); }

        // 2. Open Food Facts (окремий блок)
        try {
            const off = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const oData = await off.json();
            if (oData && oData.status === 1) {
                let n = oData.product.product_name || oData.product.generic_name;
                return await translateUA(n);
            }
        } catch(e) { console.log("OFF API Error"); }

        return null;
    }

    async function translateUA(text) {
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=uk&dt=t&q=${encodeURIComponent(text)}`);
            const d = await res.json();
            return d[0][0][0];
        } catch { return text; }
    }

    async function saveToCatalog(code, name) {
        return fetch(`${SB_URL}/product_catalog`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' },
            body: JSON.stringify({ barcode: code, name: name })
        }).catch(e => console.log("Catalog save error", e));
    }

    async function logScan(code, name) {
        return fetch(`${SB_URL}/scans`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ warehouse_name: warehouse, code_data: code, product_name: name, username: tg.initDataUnsafe?.user?.first_name || "User" })
        }).catch(e => console.log("Log save error", e));
    }

    function boostCamera() {
        if (!videoTrack) return;
        const s = videoTrack.getSettings();
        videoTrack.applyConstraints({
            advanced: [{ zoom: 1.3 }, { torch: !s.torch }, { focusMode: "continuous" }]
        }).catch(() => {
            // Якщо зум не підтримується, просто блимаємо ліхтариком
            videoTrack.applyConstraints({advanced: [{torch: !s.torch}]});
        });
    }

    function showOverlay(icon, title, desc) {
        document.getElementById('ov-icon').innerText = icon;
        document.getElementById('ov-title').innerText = title;
        document.getElementById('ov-desc').innerText = desc;
        document.getElementById('status-overlay').classList.add('active');
    }

    function hideOverlay() { document.getElementById('status-overlay').classList.remove('active'); }

    function sendToBot(c, n) {
        const msg = `📦 *${warehouse}*\n🔹 *${n}*\n🔢 \`${c}\``;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: msg, parse_mode: 'Markdown' })
        }).catch(e => console.log("Bot error"));
    }
</script>
</body>
</html>
