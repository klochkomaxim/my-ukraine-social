<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Склад Сканер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --ua-blue: #0057b7;
            --ua-yellow: #ffd700;
            --bg: #f8fafc;
            --card: #ffffff;
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg); 
            background-image: linear-gradient(180deg, var(--ua-blue) 0%, var(--ua-blue) 15%, var(--bg) 15%, var(--bg) 100%);
            color: #334155; 
            margin: 0; 
            padding: 15px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header { text-align: center; color: white; margin-bottom: 20px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        
        .card { 
            background: var(--card); 
            padding: 20px; 
            border-radius: 24px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
            border: 2px solid var(--ua-yellow);
        }
        
        #reader { 
            width: 100%; 
            border-radius: 18px; 
            overflow: hidden; 
            background: #000;
            border: 4px solid #f1f5f9;
        }

        .btn-flash { 
            width: 100%; 
            background: var(--ua-blue); 
            color: white; 
            border: none; 
            padding: 15px; 
            border-radius: 12px; 
            font-weight: bold; 
            margin-top: 15px;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0, 87, 183, 0.2);
        }

        /* ЦЕНТРАЛЬНЕ ПОВІДОМЛЕННЯ */
        .success-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: rgba(255, 255, 255, 0.95);
            border: 5px solid var(--ua-yellow);
            color: var(--ua-blue);
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            z-index: 9999;
            display: none;
            box-shadow: 0 0 100px rgba(0,0,0,0.3);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success-overlay.show {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .success-overlay h2 { margin: 0; font-size: 24px; }
        .success-overlay p { margin: 10px 0 0; font-weight: 600; }

        #product-display {
            margin-top: 15px;
            padding: 12px;
            background: #f1f5f9;
            border-radius: 12px;
            font-size: 14px;
            min-height: 40px;
            border-left: 5px solid var(--ua-blue);
        }
    </style>
</head>
<body>

    <div id="successOverlay" class="success-overlay">
        <h2>✅ ГОТОВО</h2>
        <p id="scannedItemName">Товар проскановано!</p>
    </div>

    <div class="header">
        <h2 style="margin:0;">UA СКЛАД 🇺🇦</h2>
        <span id="whLabel" style="font-size: 14px; opacity: 0.9;">Назва складу...</span>
    </div>

    <div class="card">
        <div id="reader"></div>
        <button class="btn-flash" onclick="toggleFlash()">🔦 УВІМКНУТИ ЛІХТАРИК</button>
        
        <div id="product-display">🔍 Очікую на сканування...</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // КОНФІГУРАЦІЯ
    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";

    let warehouseName = prompt("Введіть назву складу 🇺🇦", "Головний склад") || "Мій склад";
    document.getElementById('whLabel').innerText = "Склад: " + warehouseName;

    let lastResult = "";
    let lastTime = 0;
    let videoTrack = null;
    let isFlash = false;

    // ПЕРЕКЛАД НА УКРАЇНСЬКУ (Google Translate Free API)
    async function translateToUA(text) {
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=uk&dt=t&q=${encodeURIComponent(text)}`);
            const data = await res.json();
            return data[0][0][0];
        } catch (e) { return text; }
    }

    const html5QrCode = new Html5Qrcode("reader");
    const config = { 
        fps: 25, 
        qrbox: (w, h) => { return { width: w * 0.85, height: h * 0.45 }; },
        videoConstraints: { facingMode: "environment", focusMode: "continuous" }
    };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(() => { videoTrack = html5QrCode.getRunningTrack(); });

    async function toggleFlash() {
        if (!videoTrack) return;
        isFlash = !isFlash;
        videoTrack.applyConstraints({ advanced: [{ torch: isFlash }] });
    }

    async function getProductName(barcode) {
        try {
            // 1. Своя база
            const local = await fetch(`${SB_URL}/product_catalog?barcode=eq.${barcode}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const data = await local.json();
            if (data.length > 0) return data[0].name;

            // 2. Глобальна база
            const global = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
            const gData = await global.json();
            
            if (gData.status === 1) {
                let name = gData.product.product_name || gData.product.generic_name;
                // АВТОПЕРЕКЛАД
                name = await translateToUA(name);
                saveToCatalog(barcode, name);
                return name;
            }
        } catch (e) {}
        return null;
    }

    async function onScanSuccess(decodedText) {
        if (Date.now() - lastTime < 3500) return;
        lastTime = Date.now();

        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');

        document.getElementById('product-display').innerText = "⏳ Шукаю та перекладаю...";
        
        let productName = await getProductName(decodedText);

        if (!productName) {
            productName = prompt(`Товар ${decodedText} не знайдено. Назвіть його:`);
            if (!productName) productName = "Невідомий товар";
            else saveToCatalog(decodedText, productName);
        }

        // Показ великого вікна по центру
        document.getElementById('scannedItemName').innerText = productName;
        const overlay = document.getElementById('successOverlay');
        overlay.classList.add('show');
        
        document.getElementById('product-display').innerHTML = `<b>📦 ${productName}</b><br><small>Код: ${decodedText}</small>`;

        // Відправка
        saveScan(productName, decodedText);
        sendTelegram(productName, decodedText);

        setTimeout(() => { overlay.classList.remove('show'); }, 2000);
    }

    function saveToCatalog(barcode, name) {
        fetch(`${SB_URL}/product_catalog`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ barcode: barcode, name: name })
        });
    }

    function saveScan(name, code) {
        fetch(`${SB_URL}/scans`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ warehouse_name: warehouseName, code_data: code, product_name: name, username: tg.initDataUnsafe?.user?.first_name })
        });
    }

    function sendTelegram(name, code) {
        const text = `💙💛 *Проскановано!*\n🏭 Склад: ${warehouseName}\n📦 Товар: *${name}*\n🔢 Код: \`${code}\``;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: text, parse_mode: 'Markdown' })
        });
    }
</script>
</body>
</html>
