<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA СКЛАД FINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: white; margin: 0; overflow: hidden; }
        #reader { width: 100% !important; height: 60vh !important; }
        #log-area { background: #111; color: #0f0; font-size: 11px; height: 30vh; overflow-y: auto; padding: 10px; font-family: monospace; border-top: 2px solid #0057b7; text-align: left; }
        .ov { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

<div id="ov" class="ov">
    <h1 id="ov-i">🔎</h1>
    <h2 id="ov-t">ОБРОБКА</h2>
    <p id="ov-d"></p>
</div>

<div style="background: #0057b7; padding: 10px; font-weight: bold;">UA СКЛАД 🇺🇦</div>

<div id="reader"></div>

<div id="log-area">
    <div>> Система ініціалізована...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";


    function writeLog(m, c = "#0f0") {
        const l = document.getElementById('log-area');
        l.innerHTML = `<div style="color:${c}">> ${m}</div>` + l.innerHTML;
    }

    const scanner = new Html5Qrcode("reader");
    scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScan);

    async function onScan(code) {
        writeLog("Скан: " + code, "#fff");
        scanner.pause();
        showOv("⏳", "ПЕРЕВІРКА", code);

        let name = "";

        // 1. ЧИТАННЯ
        try {
            const r = await fetch(`${SB_URL}/product_catalog?barcode=eq.${code}`, {
                method: "GET",
                headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
            });
            const d = await r.json();
            if (d && d.length > 0) {
                name = d[0].name;
                writeLog("Знайдено в базі: " + name);
            }
        } catch(e) { writeLog("Помилка читання: " + e.message, "red"); }

        // 2. ВВЕДЕННЯ
        if (!name) {
            name = prompt("Товар не знайдено. Введіть назву:");
            if (name) {
                try {
                    await fetch(`${SB_URL}/product_catalog`, {
                        method: "POST",
                        headers: { 
                            "apikey": SB_KEY, 
                            "Authorization": "Bearer " + SB_KEY,
                            "Content-Type": "application/json",
                            "Prefer": "resolution=merge-duplicates"
                        },
                        body: JSON.stringify({ barcode: code, name: name })
                    });
                    writeLog("Базу оновлено!", "yellow");
                } catch(e) { writeLog("Помилка запису: " + e.message, "red"); }
            }
        }

        // 3. ЗВІТ У ТЕЛЕГРАМ ТА СКАН-ЛОГ
        if (name) {
            sendTG(code, name);
            logScanToDB(code, name);
            showOv("✅", "ГОТОВО", name);
        }

        setTimeout(() => { hideOv(); scanner.resume(); }, 2000);
    }

    async function logScanToDB(c, n) {
        try {
            await fetch(`${SB_URL}/scans`, {
                method: "POST",
                headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY, "Content-Type": "application/json" },
                body: JSON.stringify({ warehouse_name: "Головний", code_data: c, product_name: n, username: "Admin" })
            });
        } catch(e) {}
    }

    function sendTG(c, n) {
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: `📦 ${n}\n🔢 ${c}` })
        });
    }

    function showOv(i,t,d) {
        document.getElementById('ov-i').innerText = i;
        document.getElementById('ov-t').innerText = t;
        document.getElementById('ov-d').innerText = d;
        document.getElementById('ov').style.display = 'flex';
    }
    function hideOv() { document.getElementById('ov').style.display = 'none'; }
</script>
</body>
</html>
