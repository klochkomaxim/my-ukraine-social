<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Social</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; padding: 15px; text-align: center; }
        .card { background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; margin-bottom: 20px; }
        textarea { width: 100%; box-sizing: border-box; background: #1a1a1a; color: white; border: 1px solid #333; padding: 12px; border-radius: 10px; font-size: 16px; min-height: 100px; margin-bottom: 10px; outline: none; resize: none; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .btn:active { background: #0077b3; transform: scale(0.98); }
        #feed { margin-top: 20px; padding-bottom: 80px; text-align: left; }
        .post { background: #111; padding: 12px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid #0088cc; }
        #footer-player { position: fixed; bottom: 0; left: 0; width: 100%; background: #0a0a0a; padding: 15px; border-top: 1px solid #333; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        #play-btn { background: #e53935; color: white; border: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <h3>Вітаю, Максим! 🇺🇦</h3>

    <div class="card">
        <textarea id="post-input" placeholder="Напиши щось цікаве..."></textarea>
        <button onclick="sendPost()" id="send-btn" class="btn">Опублікувати 🚀</button>
    </div>

    <div id="feed">Завантаження...</div>

    <div id="footer-player">
        <span style="font-size: 14px;">Radio Rocks UA</span>
        <button id="play-btn" onclick="toggleMusic()">ГРАТИ ▶</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";

        // МУЗИКА
        let audio = new Audio("https://online.radioroks.ua/RadioROKS");
        function toggleMusic() {
            const btn = document.getElementById('play-btn');
            if (audio.paused) {
                audio.play();
                btn.innerText = "ПАУЗА ⏸";
            } else {
                audio.pause();
                btn.innerText = "ГРАТИ ▶";
            }
        }

        // ВІДПРАВКА ПОСТА
        async function sendPost() {
            const input = document.getElementById('post-input');
            const btn = document.getElementById('send-btn');
            const text = input.value.trim();

            if (!text) return;
            btn.innerText = "Надсилаю...";
            btn.disabled = true;

            try {
                const res = await fetch(`${SB_URL}/rest/v1/posts`, {
                    method: 'POST',
                    headers: {
                        'apikey': SB_KEY,
                        'Authorization': `Bearer ${SB_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ username: "Максим", content: text })
                });

                if (res.ok) {
                    input.value = "";
                    loadFeed();
                } else {
                    alert("Помилка бази! Виконай Крок 1.");
                }
            } catch (e) {
                alert("Помилка мережі");
            }
            btn.innerText = "Опублікувати 🚀";
            btn.disabled = false;
        }

        // ЗАВАНТАЖЕННЯ СТРІЧКИ
        async function loadFeed() {
            try {
                const res = await fetch(`${SB_URL}/rest/v1/posts?select=*&order=created_at.desc`, {
                    headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
                });
                const data = await res.json();
                document.getElementById('feed').innerHTML = data.map(p => `
                    <div class="post">
                        <b>@${p.username}</b>
                        <p style="margin:5px 0 0;">${p.content}</p>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('feed').innerText = "Помилка стрічки";
            }
        }

        loadFeed();
    </script>
</body>
</html>
