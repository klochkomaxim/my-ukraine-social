<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA SKЛАД FINAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 0; text-align: center; }
        #reader { width: 100% !important; max-width: 400px; margin: 20px auto; border: 2px solid #0057b7; border-radius: 15px; overflow: hidden; }
        .btn { background: #0057b7; color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; margin: 10px; width: 80%; }
        #debug { background: #000; color: #0f0; font-size: 11px; padding: 10px; text-align: left; height: 150px; overflow-y: auto; font-family: monospace; border-top: 2px solid #ffd700; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 id="ov-icon">🔎</h1>
    <h2 id="ov-title">ПОШУК...</h2>
    <p id="ov-desc"></p>
</div>

<div style="background: #0057b7; padding: 15px;">
    <h2 style="margin:0;">UA СКЛАД 🇺🇦</h2>
</div>

<div id="reader"></div>
<button class="btn" onclick="location.reload()">🔄 ПЕРЕЗАПУСТИТИ</button>

<div id="debug">> Система завантажується...</div>

<script>
    const tg = window.Telegram.WebApp;
    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";


    function log(msg) {
        const d = document.getElementById('debug');
        d.innerHTML = `> ${msg}<br>` + d.innerHTML;
    }

    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScan);

    async function onScan(code) {
        log("Знайдено код: " + code);
        html5QrCode.pause();
        showOv("🔎", "ПОШУК", code);

        // 1. ПОШУК
        let name = null;
        try {
            const res = await fetch(`${SB_URL}/product_catalog?barcode=eq.${code}`, {
                headers: { "apikey": SB_KEY, "Authorization": `Bearer ${SB_KEY}` }
            });
            const data = await res.json();
            if (data.length > 0) name = data[0].name;
        } catch(e) { log("Помилка читання: " + e.message); }

        // 2. ВВЕДЕННЯ ЯКЩО НЕМАЄ
        if (!name) {
            name = prompt("Назва товару:");
            if (name) {
                try {
                    const save = await fetch(`${SB_URL}/product_catalog`, {
                        method: 'POST',
                        headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ barcode: code, name: name })
                    });
                    if (save.ok) log("Збережено в базу!");
                    else log("Помилка бази: " + save.statusText);
                } catch(e) { log("Помилка збереження: " + e.message); }
            }
        }

        // 3. ТЕЛЕГРАМ ТА СКАН-ЛОГ
        sendTG(code, name || "Без назви");
        
        showOv("✅", "ГОТОВО", name || "Скан відправлено");
        setTimeout(() => { hideOv(); html5QrCode.resume(); }, 2000);
    }

    function sendTG(c, n) {
        const text = `📦 СКЛАД: ${n}\n🔢 Код: ${c}`;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: text })
        }).then(() => log("Надіслано в Telegram")).catch(e => log("TG помилка: " + e.message));
    }

    function showOv(i,t,d) {
        document.getElementById('ov-icon').innerText = i;
        document.getElementById('ov-title').innerText = t;
        document.getElementById('ov-desc').innerText = d;
        document.getElementById('overlay').style.display = 'flex';
    }
    function hideOv() { document.getElementById('overlay').style.display = 'none'; }
</script>
</body>
</html>
