<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Склад Pro v4</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #0057b7; --yellow: #ffd700; }
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .scanner-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px; }
        #reader { width: 100% !important; max-width: 400px; border-radius: 20px; overflow: hidden; border: 4px solid white; background: #000; }
        .btn { width: 100%; max-width: 400px; background: white; border: 2px solid var(--blue); color: var(--blue); padding: 15px; border-radius: 15px; font-weight: bold; margin-top: 15px; }
        #status-overlay { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; border: 4px solid var(--yellow); padding: 25px; border-radius: 30px; text-align: center; z-index: 9999; width: 80%; display: none; }
        .active { display: block !important; }
        #debug-log { font-size: 11px; color: red; padding: 10px; text-align: center; overflow-y: auto; max-height: 100px; }
    </style>
</head>
<body>

<div id="status-overlay">
    <h1 id="ov-icon">⏳</h1>
    <h3 id="ov-title">Пошук...</h3>
    <p id="ov-desc" style="font-weight: bold;"></p>
</div>

<div class="header">
    <h2 style="margin:0;">UA СКЛАД 🇺🇦</h2>
    <div id="whLabel" style="font-size: 13px;">Склад: Головний</div>
</div>

<div class="scanner-container">
    <div id="reader"></div>
    <button class="btn" onclick="toggleTorch()">🔦 ЛІХТАРИК / ФОКУС</button>
    <div id="debug-log">Система готова. Очікування сканування...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";

    let warehouse = "Головний";
    let isBusy = false;
    let scanner = new Html5Qrcode("reader");

    function printLog(msg) {
        const log = document.getElementById('debug-log');
        log.innerHTML = msg + "<br>" + log.innerHTML;
    }

    // Запуск камери без зайвих функцій
    scanner.start(
        { facingMode: "environment" },
        { fps: 20, qrbox: { width: 250, height: 150 } },
        onScanSuccess
    ).catch(e => printLog("Помилка старту: " + e));

    async function onScanSuccess(code) {
        if (isBusy) return;
        isBusy = true;
        
        try { scanner.pause(); } catch(e) {}
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        
        showOverlay("🔎", "АНАЛІЗ КОДУ", code);
        printLog("Скановано код: " + code);

        // 1. ПОШУК (Тут ми ловимо помилку Load Failed)
        let name = await fullSearch(code);

        // 2. ЯКЩО НЕ ЗНАЙШЛИ АБО ПОМИЛКА МЕРЕЖІ
        if (!name) {
            name = prompt(`Код ${code}. Введіть назву:`);
            if (name) {
                await saveToCatalog(code, name);
            } else {
                name = "Товар без назви";
            }
        }

        showOverlay("✅", "ГОТОВО", name);
        
        // 3. ЗБЕРЕЖЕННЯ СКАНУ
        await logScan(code, name);
        sendBot(code, name);

        setTimeout(() => {
            hideOverlay();
            try { scanner.resume(); } catch(e) {}
            isBusy = false;
        }, 2500);
    }

    async function fullSearch(code) {
        try {
            printLog("Запит до бази...");
            const res = await fetch(`${SB_URL}/product_catalog?barcode=eq.${code}`, {
                method: "GET",
                headers: { 
                    "apikey": SB_KEY, 
                    "Authorization": `Bearer ${SB_KEY}`,
                    "Content-Type": "application/json"
                }
            });
            
            if (!res.ok) throw new Error("Status: " + res.status);
            
            const data = await res.json();
            if (data && data.length > 0) return data[0].name;

            // Спробуємо Open Food Facts якщо в нашій базі немає
            const off = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const oData = await off.json();
            if (oData.status === 1) return oData.product.product_name;

        } catch (e) { 
            printLog("Помилка мережі: " + e.message); 
            return null; 
        }
        return null;
    }

    async function saveToCatalog(code, name) {
        try {
            await fetch(`${SB_URL}/product_catalog`, {
                method: 'POST',
                headers: { 
                    'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 
                    'Content-Type': 'application/json', 'Prefer': 'resolution=merge-duplicates' 
                },
                body: JSON.stringify({ barcode: code, name: name })
            });
            printLog("Збережено в каталог!");
        } catch (e) { printLog("Не вдалося зберегти!"); }
    }

    async function logScan(code, name) {
        try {
            await fetch(`${SB_URL}/scans`, {
                method: 'POST',
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    warehouse_name: warehouse, 
                    code_data: code, 
                    product_name: name, 
                    username: tg.initDataUnsafe?.user?.first_name || "Admin" 
                })
            });
            printLog("Скан записано!");
        } catch (e) { printLog("Помилка запису скану!"); }
    }

    function toggleTorch() {
        // Спрощений метод для iPhone (без getRunningTrack)
        const videoElement = document.querySelector('#reader video');
        if (videoElement && videoElement.srcObject) {
            const track = videoElement.srcObject.getVideoTracks()[0];
            const caps = track.getCapabilities();
            if (caps.torch) {
                const isTorchOn = track.getSettings().torch;
                track.applyConstraints({ advanced: [{ torch: !isTorchOn }] });
            } else {
                printLog("Ліхтарик не підтримується");
            }
        }
    }

    function showOverlay(i, t, d) {
        document.getElementById('ov-icon').innerText = i;
        document.getElementById('ov-title').innerText = t;
        document.getElementById('ov-desc').innerText = d;
        document.getElementById('status-overlay').classList.add('active');
    }
    function hideOverlay() { document.getElementById('status-overlay').classList.remove('active'); }

    function sendBot(c, n) {
        const txt = `📦 *${warehouse}*\n🔹 *${n}*\n🔢 \`${c}\``;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: txt, parse_mode: 'Markdown' })
        });
    }
</script>
</body>
</html>
