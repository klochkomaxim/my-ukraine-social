<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UA Склад Сканер Fix</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #0057b7; --yellow: #ffd700; --white: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: var(--blue); color: white; padding: 15px; text-align: center; border-radius: 0 0 20px 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .scanner-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; position: relative; }
        #reader { width: 100% !important; max-width: 380px; border-radius: 25px; overflow: hidden; border: 4px solid var(--white); box-shadow: 0 15px 35px rgba(0,0,0,0.15); }
        .btn-flash { width: 100%; max-width: 380px; background: var(--white); border: 2px solid var(--blue); color: var(--blue); padding: 15px; border-radius: 15px; font-weight: bold; margin-top: 20px; font-size: 16px; }
        
        /* ЦЕНТРАЛЬНЕ ПОВІДОМЛЕННЯ (БЕЗ ЗАВИСАНЬ) */
        #status-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95); border: 4px solid var(--yellow);
            padding: 25px; border-radius: 30px; text-align: center; z-index: 9999;
            width: 80%; display: none; box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }
        .active { display: block !important; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -40%); } to { opacity: 1; transform: translate(-50%, -50%); } }
    </style>
</head>
<body>

    <div id="status-overlay">
        <h1 id="overlay-icon" style="margin:0;">⌛</h1>
        <h3 id="overlay-title" style="color: var(--blue); margin: 10px 0;">Шукаю товар...</h3>
        <p id="overlay-desc" style="font-weight: bold; color: #333; margin: 0;"></p>
    </div>

    <div class="header">
        <h2 style="margin:0;">UA СКЛАД 🇺🇦</h2>
        <div id="whName" style="font-size: 14px; opacity: 0.8;">Завантаження...</div>
    </div>

    <div class="scanner-wrapper">
        <div id="reader"></div>
        <button class="btn-flash" onclick="boostFocus()">🔦 ЛІХТАРИК ТА ФОКУС</button>
        <div style="margin-top: 15px; color: #7f8c8d; font-size: 13px;">Тримайте телефон на відстані 15-20 см</div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const BOT_TOKEN = "8434922111:AAGEEoBwKba5ZO0r7FnAusEc31XIV_oAjtw"; 
    const SB_URL = "https://qappwloefuraalqfcekl.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFhcHB3bG9lZnVyYWFscWZjZWtsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE2OTIzOTcsImV4cCI6MjA4NzI2ODM5N30.vRZSxRXqoOXG-TI5qeBvm2L9Hvi8NeLeOXpFlzrgEQI";


    let warehouse = prompt("Введіть назву складу:", "Головний") || "Склад";
    document.getElementById('whName').innerText = "Склад: " + warehouse;

    const html5QrCode = new Html5Qrcode("reader");
    let videoTrack = null;
    let isProcessing = false;

    const config = { 
        fps: 20, 
        qrbox: { width: 280, height: 160 },
        aspectRatio: 1.0,
        videoConstraints: { 
            facingMode: "environment", 
            width: { ideal: 1280 }, 
            height: { ideal: 720 } 
        }
    };

    // Запуск сканера
    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .then(track => {
            videoTrack = html5QrCode.getRunningTrack();
            boostFocus(); // Початковий фокус
        });

    async function onScanSuccess(decodedText) {
        if (isProcessing) return;
        isProcessing = true;
        
        // Пауза сканера (щоб не зависало)
        html5QrCode.pause(); 

        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
        showOverlay("🔎", "Пошук у мережі...", decodedText);

        let name = await fullSearch(decodedText);

        if (!name) {
            name = prompt(`Товар ${decodedText} не знайдено. Назва:`) || "Невідомий товар";
        }

        showOverlay("✅", "ПРОСКАНОВАНО", name);
        
        // Відправка даних
        saveToDB(decodedText, name);
        sendToTelegram(decodedText, name);

        // ВІДНОВЛЕННЯ РОБОТИ ЧЕРЕЗ 2.5 СЕКУНДИ
        setTimeout(() => {
            hideOverlay();
            html5QrCode.resume();
            isProcessing = false;
        }, 2500);
    }

    async function fullSearch(code) {
        try {
            // 1. Власна база
            const local = await fetch(`${SB_URL}/product_catalog?barcode=eq.${code}`, {
                headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }
            });
            const lData = await local.json();
            if (lData.length > 0) return lData[0].name;

            // 2. Open Food Facts
            const off = await fetch(`https://world.openfoodfacts.org/api/v0/product/${code}.json`);
            const oData = await off.json();
            if (oData.status === 1) {
                const n = oData.product.product_name || oData.product.generic_name;
                const translated = await translate(n);
                saveToCatalog(code, translated);
                return translated;
            }
        } catch (e) { console.error(e); }
        return null;
    }

    async function translate(text) {
        try {
            const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=uk&dt=t&q=${encodeURIComponent(text)}`);
            const d = await res.json();
            return d[0][0][0];
        } catch { return text; }
    }

    function boostFocus() {
        if (!videoTrack) return;
        const capabilities = videoTrack.getCapabilities();
        const settings = videoTrack.getSettings();

        // Скидаємо та примусово ставимо фокус + невеликий зум
        const constraints = {
            advanced: [
                { zoom: 1.1 }, // Легкий зум для iPhone
                { focusMode: settings.focusMode === "continuous" ? "manual" : "continuous" },
                { torch: settings.torch === false ? false : true }
            ]
        };
        videoTrack.applyConstraints(constraints).catch(() => {});
    }

    function showOverlay(icon, title, desc) {
        document.getElementById('overlay-icon').innerText = icon;
        document.getElementById('overlay-title').innerText = title;
        document.getElementById('overlay-desc').innerText = desc;
        document.getElementById('status-overlay').classList.add('active');
    }

    function hideOverlay() {
        document.getElementById('status-overlay').classList.remove('active');
    }

    function saveToDB(code, name) {
        fetch(`${SB_URL}/scans`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ warehouse_name: warehouse, code_data: code, product_name: name, username: tg.initDataUnsafe?.user?.first_name })
        });
    }

    function saveToCatalog(code, name) {
        fetch(`${SB_URL}/product_catalog`, {
            method: 'POST',
            headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ barcode: code, name: name })
        });
    }

    function sendToTelegram(code, name) {
        const text = `📦 *${warehouse}*\n✅ Товар: *${name}*\n🔢 Код: \`${code}\``;
        fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: tg.initDataUnsafe?.user?.id, text: text, parse_mode: 'Markdown' })
        });
    }
</script>
</body>
</html>
